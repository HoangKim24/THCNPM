<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Trang thống kê | Delicacy</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
</head>
<body>
  <aside class="sidebar">
    <h2>Coopmart Admin</h2>
    <ul>
      <li><a href="admin.html" class="active"><i class="bx bx-grid-alt"></i> Dashboard</a></li>
      <li><a href="sanpham.html"><i class="bx bx-box"></i> Sản phẩm</a></li>
      <li><a href="danhmuc.html"><i class="bx bx-category"></i> Danh mục</a></li>
      <li><a href="hoadon.html"><i class="bx bx-receipt"></i> Hóa đơn</a></li>
      <li><a href="users.html"><i class="bx bx-user"></i> Người dùng</a></li>
      <li><a href="vouchers.html"><i class="bx bx-purchase-tag"></i> Voucher</a></li>
      <li><a href="../index.html" style="margin-top: 2rem; color: #ef4444;"><i class="bx bx-log-out"></i> Thoát</a></li>
    </ul>
  </aside>
  <main class="dashboard">
  <h1>Trang Quản Trị</h1>
  <section class="stats-grid">
    <div class="stat-box">
      <h3>Sản phẩm</h3>
      <p id="stat-sanpham">...</p>
    </div>
    <div class="stat-box">
      <h3>Danh mục</h3>
      <p id="stat-danhmuc">...</p>
    </div>
    <div class="stat-box">
      <h3>Tài khoản</h3>
      <p id="stat-user">...</p>
    </div>
    <div class="stat-box" id="low-stock-alert" style="background: #fff5f5; border: 1px solid #feb2b2; display: none;">
      <h3 style="color: #c53030;">⚠️ Sắp hết hàng</h3>
      <p id="stat-low-stock" style="color: #c53030; font-weight: bold;">0 sản phẩm</p>
    </div>
    <div class="stat-box">
      <h3>Doanh thu tháng</h3>
      <p id="stat-doanhthu">...</p>
    </div>
  </section>

  <!-- Biểu đồ -->
  <section style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem; max-width: 1200px; margin: 32px auto 0;">
    <div style="background:#fff; padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
        <h2 style="text-align:center; margin-bottom: 1.5rem; color: #2d8f4e; font-size: 1.25rem;">Doanh thu theo tháng</h2>
        <canvas id="chartDoanhThu" height="150"></canvas>
    </div>
    <div style="background:#fff; padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
        <h2 style="text-align:center; margin-bottom: 1.5rem; color: #2d8f4e; font-size: 1.25rem;">Sản phẩm bán chạy nhất</h2>
        <div id="top-products-list" style="padding-top: 10px;">
          <p style="text-align: center; color: #888;">Đang tải...</p>
        </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</main>
<script src="stats.js"></script>
</body>
</html>
