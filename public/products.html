<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản phẩm | Siêu thị</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css" />
</head>
<body>
  <header>
    <a href="index.html" class="logo"><i class="bx bxs-basket"></i> Siêu Thị 4 anh em siêu nhân</a>
    <ul class="navbar">
      <li><a href="index.html">Home</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="products.html" class="home-active">Sản phẩm</a></li>
      <li><a href="cart.html"><i class='bx bx-cart'></i> Giỏ hàng</a></li>
      <li><a href="invoices.html"><i class='bx bx-receipt'></i> Hóa đơn của tôi</a></li>
    </ul>
    <div class="profile">
      <img src="images/HinhAnh-1752415674712-693980431.jpg" alt="Avatar">
      <span>Khách</span>
      <i class="bx bx-caret-down"></i>
    </div>
  </header>

  <section class="products-page">
    <div class="heading horizontal-heading">
      <h1><span>Danh sách</span> <span>Sản phẩm</span></h1>
    </div>
    
    <div class="filter-bar" style="max-width: 1200px; margin: 0 auto 30px; display: flex; gap: 15px; flex-wrap: wrap; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <div class="filter-item" style="flex: 1; min-width: 200px;">
            <input type="text" id="search-input" placeholder="Tìm kiếm sản phẩm..." style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem;">
        </div>
        <div class="filter-item">
            <select id="category-filter" style="padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; background: #fff; cursor: pointer;">
                <option value="all">Tất cả danh mục</option>
            </select>
        </div>
        <div class="filter-item">
            <select id="price-filter" style="padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; background: #fff; cursor: pointer;">
                <option value="all">Mọi mức giá</option>
                <option value="0-50000">Dưới 50.000₫</option>
                <option value="50000-100000">50.000₫ - 100.000₫</option>
                <option value="100000-above">Trên 100.000₫</option>
            </select>
        </div>
    </div>

    <div class="products-container" id="products-list"></div>
  </section>

  <script src="user.js"></script>
  <script src="products.js"></script>
</body>
</html>
