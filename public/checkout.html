<script>
  if (!location.href.startsWith("http://localhost:3000")) {
    location.href = "http://localhost:3000/checkout.html";
  }
</script>
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh toán | Siêu thị</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css" />
</head>
<body>
  <header>
    <a href="index.html" class="logo"><i class="bx bxs-basket"></i> Siêu Thị 4 anh em siêu nhân</a>
    <ul class="navbar">
      <li><a href="index.html">Home</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="products.html">Sản phẩm</a></li>
      <li><a href="cart.html"><i class='bx bx-cart'></i> Giỏ hàng</a></li>
      <li><a href="invoices.html"><i class='bx bx-receipt'></i> Hóa đơn của tôi</a></li>
    </ul>
    <div class="profile">
      <img src="images/HinhAnh-1752415674712-693980431.jpg" alt="Avatar">
      <span>Khách</span>
    </div>
  </header>

  <section class="checkout-page">
    <h1 class="checkout-title"><i class="bx bx-credit-card"></i> Thanh toán đơn hàng</h1>
    <div class="checkout-layout">
      <div class="checkout-order">
        <h2>Đơn hàng của bạn</h2>
        <div id="checkout-items" class="checkout-items"></div>
      </div>
      <div class="checkout-form-wrap">
        <h2>Thông tin giao hàng</h2>
        <div class="checkout-form">
      <label for="tenKhachHang">Họ tên khách hàng <span class="required">*</span></label>
      <input type="text" id="tenKhachHang" placeholder="Nhập họ tên" required />

      <label for="soDienThoai">Số điện thoại <span class="required">*</span></label>
      <input type="tel" id="soDienThoai" placeholder="Nhập SĐT để nhận đơn và tra cứu hóa đơn" required />
        </div>

        <div class="voucher-section">
      <label for="voucher-input">Mã giảm giá (nếu có):</label>
      <input type="text" id="voucher-input" placeholder="VD: GIAM10, GIAM20" />
          <button type="button" id="apply-voucher" class="btn small">Áp dụng</button>
        </div>

        <div class="checkout-totals">
          <p class="cart-total">Tạm tính: <span id="original-total">0₫</span></p>
          <p class="discount-info">Giảm giá: <span id="discount-amount">0₫</span></p>
          <p class="vat-info">VAT (10%): <span id="vat-amount">0₫</span></p>
          <p class="cart-total final">Tổng thanh toán: <span id="final-total">0₫</span></p>
        </div>

        <div class="checkout-actions">
          <a href="cart.html" class="btn btn-outline">Quay lại giỏ hàng</a>
          <button id="confirm-order" class="btn confirm-btn"><i class="bx bx-check"></i> Xác nhận đơn hàng</button>
        </div>
      </div>
    </div>
  </section>

  <script src="user.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const checkoutItems = document.getElementById('checkout-items');
      const originalTotalEl = document.getElementById('original-total');
      const discountAmountEl = document.getElementById('discount-amount');
      const vatAmountEl = document.getElementById('vat-amount');
      const finalTotalEl = document.getElementById('final-total');
      const voucherInput = document.getElementById('voucher-input');
      const applyBtn = document.getElementById('apply-voucher');
      const confirmBtn = document.getElementById('confirm-order');
      const tenKhachHangEl = document.getElementById('tenKhachHang');
      const soDienThoaiEl = document.getElementById('soDienThoai');

      // Gợi ý từ user đã đăng nhập / đơn trước
      const latest = JSON.parse(localStorage.getItem('latestOrder') || '{}');
      if (latest.tenKhachHang) tenKhachHangEl.value = latest.tenKhachHang;
      if (latest.soDienThoai) soDienThoaiEl.value = latest.soDienThoai;
      const currentUser = localStorage.getItem('currentUser');
      if (currentUser && currentUser !== 'Khách' && !tenKhachHangEl.value) tenKhachHangEl.value = currentUser;

      if (cart.length === 0) {
        checkoutItems.innerHTML = '<p>Giỏ hàng trống. <a href="products.html">Chọn sản phẩm</a>.</p>';
        confirmBtn.disabled = true;
        return;
      }

      let total = 0;
      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        const div = document.createElement('div');
        div.className = 'checkout-item';
        div.innerHTML = `<span>${item.name}</span><span>x${item.quantity}</span><span>${subtotal.toLocaleString('vi-VN')}₫</span>`;
        checkoutItems.appendChild(div);
      });

      let discount = 0;

      function updateTotal() {
        const code = (voucherInput.value || '').trim().toUpperCase();
        if (code === 'GIAM10') discount = Math.floor(total * 0.10);
        else if (code === 'GIAM20') discount = Math.floor(total * 0.20);
        else discount = 0;

        const afterDiscount = total - discount;
        const vat = Math.floor(afterDiscount * 0.10);
        const finalTotal = afterDiscount + vat;

        originalTotalEl.textContent = total.toLocaleString('vi-VN') + '₫';
        discountAmountEl.textContent = discount.toLocaleString('vi-VN') + '₫';
        vatAmountEl.textContent = vat.toLocaleString('vi-VN') + '₫';
        finalTotalEl.textContent = finalTotal.toLocaleString('vi-VN') + '₫';
      }

      applyBtn.addEventListener('click', () => {
        const code = (voucherInput.value || '').trim().toUpperCase();
        if (code && code !== 'GIAM10' && code !== 'GIAM20') alert('Mã giảm giá không hợp lệ. Thử GIAM10 hoặc GIAM20.');
        updateTotal();
      });

      confirmBtn.addEventListener('click', async () => {
        const tenKhachHang = (tenKhachHangEl.value || '').trim();
        const soDienThoai = (soDienThoaiEl.value || '').trim();
        if (!tenKhachHang || !soDienThoai) {
          alert('Vui lòng nhập đầy đủ họ tên và số điện thoại.');
          return;
        }

        const items = cart.map(item => ({
          MaSanPham: item.MaSanPham,
          SoLuong: item.quantity,
          DonGia: item.price
        })).filter(i => i.MaSanPham);

        if (items.length === 0) {
          alert('Giỏ hàng không hợp lệ.');
          return;
        }

        confirmBtn.disabled = true;
        confirmBtn.textContent = 'Đang xử lý...';

        try {
          const resp = await fetch('/api/hoadon', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tenKhachHang, soDienThoai, items })
          });

          if (!resp.ok) {
            const err = await resp.text();
            throw new Error(err || 'Lỗi tạo hóa đơn');
          }

          const data = await resp.json();
          localStorage.setItem('latestOrder', JSON.stringify({ tenKhachHang, soDienThoai }));
          localStorage.removeItem('cart');
          window.location.href = 'invoice.html?ma=' + data.maHoaDon;
        } catch (e) {
          alert('Lỗi: ' + (e.message || 'Không thể tạo đơn. Kiểm tra server/database.'));
          confirmBtn.disabled = false;
          confirmBtn.textContent = 'Xác nhận đơn hàng';
        }
      });

      updateTotal();
    });
  </script>
</body>
</html>
