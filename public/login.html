<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập | Siêu thị</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
</head>
<body class="auth-page">
  <header class="main-header">
    <a href="index.html" class="logo"><i class="bx bxs-basket"></i> Siêu Thị 4 anh em</a>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Trang chủ</a>
      <a href="categories.html" class="nav-link">Danh mục</a>
      <a href="products.html" class="nav-link">Sản phẩm</a>
    </nav>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Chào mừng trở lại</h1>
        <p>Đăng nhập để tiếp tục mua sắm</p>
      </div>
      <form action="/login" method="POST" class="auth-form">
        <div class="form-group">
          <label><i class="bx bx-user"></i> Tên đăng nhập</label>
          <input type="text" name="username" placeholder="Nhập tên đăng nhập" required />
        </div>
        <div class="form-group">
          <label><i class="bx bx-lock-alt"></i> Mật khẩu</label>
          <input type="password" name="password" placeholder="Nhập mật khẩu" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
        <p class="auth-switch">
          Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </p>
      </form>
    </div>
  </main>

  <footer class="main-footer">
    <div class="container">
      <p class="footer-copy">© Siêu Thị 4 anh em. Dự án THCNPM.</p>
    </div>
  </footer>
</body>
</html>
