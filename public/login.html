<script>
  if (!location.href.startsWith("http://localhost:3000")) {
    location.href = "http://localhost:3000/login.html";
  }
</script>
<!-- public/login.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <body class="login-page">
  <div class="login-background-text">Chào mừng bạn đến với siêu thị của chúng tôi</div>
  <div class="login-container">
    <form action="/login" method="POST" class="login-form">
      <h2>Đăng nhập</h2>
      <input type="text" name="username" placeholder="Tên đăng nhập" required />
      <input type="password" name="password" placeholder="Mật khẩu" required />
      <button type="submit">Đăng nhập</button>
      <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
        Chưa có tài khoản? <a href="register.html" style="color: #6c63ff; font-weight: 600;">Đăng ký ngay</a>
      </p>
    </form>
  </div>
</body>
</html>
